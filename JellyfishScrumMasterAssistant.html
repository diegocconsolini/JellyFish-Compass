<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jellyfish Scrum Master Assistant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f9fb;color:#1a1f36}
code{font-family:'SF Mono','Fira Code','Cascadia Code',monospace;font-size:12px;background:#f1f3f7;padding:2px 6px;border-radius:3px}
pre code{background:none;padding:0}
a{color:#0055d4;text-decoration:none}
a:hover{text-decoration:underline}
input{font-family:inherit}
button{font-family:inherit}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;border-bottom:2px solid #dfe3ea;color:#525f7f;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{padding:8px 10px;border-bottom:1px solid #e8ecf1;font-size:13px}
tr:nth-child(even){background:#f1f3f7}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f3f7}
::-webkit-scrollbar-thumb{background:#c0c8d4;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useEffect,useRef}=React;

// ─── Verified Constants ──────────────────────────────────────────────────────
const API_BASE="https://app.jellyfish.co";
const ENDPOINTS={

    {path:"/endpoints/export/v0/allocations/details/by_team",name:"allocations_by_team",desc:"Allocation data for the whole company, aggregated by team at specified hierarchy level"},
    {path:"/endpoints/export/v0/allocations/details/investment_category",name:"allocations_by_investment_category",desc:"Allocation data aggregated by investment category"},
    {path:"/endpoints/export/v0/allocations/details/investment_category/by_person",name:"allocations_by_investment_category_person",desc:"Allocation data aggregated by investment category and person"},
    {path:"/endpoints/export/v0/allocations/details/investment_category/by_team",name:"allocations_by_investment_category_team",desc:"Allocation data aggregated by investment category and team"},
    {path:"/endpoints/export/v0/allocations/details/work_category",name:"allocations_by_work_category",desc:"Allocation data aggregated by deliverable within specified work category"},
    {path:"/endpoints/export/v0/allocations/details/work_category/by_person",name:"allocations_by_work_category_person",desc:"Allocation data aggregated by deliverable within work category and person"},
    {path:"/endpoints/export/v0/allocations/details/work_category/by_team",name:"allocations_by_work_category_team",desc:"Allocation data aggregated by deliverable within work category and team"},
    {path:"/endpoints/export/v0/allocations/filter_fields",name:"allocations_filter_fields",desc:"Available fields and known values for filtering allocations"},
    {path:"/endpoints/export/v0/allocations/summary_filtered/by_investment_category",name:"allocations_summary_by_investment_category",desc:"Total FTE amounts for investment categories (supports filtering)"},
    {path:"/endpoints/export/v0/allocations/summary_filtered/by_work_category",name:"allocations_summary_by_work_category",desc:"Total FTE amounts for deliverables within a work category (supports filtering)"},
  ],

    {path:"/endpoints/export/v0/delivery/deliverable_details",name:"deliverable_details",desc:"Data about a specific deliverable"},
    {path:"/endpoints/export/v0/delivery/scope_and_effort_history",name:"deliverable_scope_and_effort_history",desc:"Weekly data about deliverable scope and total effort allocated per week"},
    {path:"/endpoints/export/v0/delivery/work_categories",name:"work_categories",desc:"List of all known work categories"},
    {path:"/endpoints/export/v0/delivery/work_category_contents",name:"work_category_contents",desc:"Data about deliverables in a specified work category"},
  ],
  devex:[
    {path:"/endpoints/export/v0/devex/insights/by_team",name:"devex_insights_by_team",desc:"DevEx insights data by team"},
  ],
  metrics:[
    {path:"/endpoints/export/v0/metrics/company_metrics",name:"company_metrics",desc:"Metrics data for the company during specified timeframe"},
    {path:"/endpoints/export/v0/metrics/person_metrics",name:"person_metrics",desc:"Metrics data for a specified person during specified timeframe"},
    {path:"/endpoints/export/v0/metrics/team_metrics",name:"team_metrics",desc:"Metrics data for a specified team during specified timeframe"},
    {path:"/endpoints/export/v0/metrics/team_sprint_summary",name:"team_sprint_summary",desc:"Issue count and story point data for a team's sprints in specified timeframe"},
    {path:"/endpoints/export/v0/metrics/unlinked_pull_requests",name:"unlinked_pull_requests",desc:"Details of unlinked pull requests merged during specified timeframe"},
  ],
  people:[
    {path:"/endpoints/export/v0/people/list_engineers",name:"list_engineers",desc:"List of all active allocatable people as of a specific date"},
    {path:"/endpoints/export/v0/people/search",name:"search_people",desc:"Search for people by name, email, or id"},
  ],
  teams:[
    {path:"/endpoints/export/v0/teams/list_teams",name:"list_teams",desc:"All teams at specified hierarchy level (optionally includes child teams)"},
    {path:"/endpoints/export/v0/teams/search",name:"search_teams",desc:"Search for teams by name or id"},
  ],
};
const ALL_ENDPOINTS=Object.values(ENDPOINTS).flat();

const DORA_METRICS=[
  {name:"Deployment Frequency",desc:"Track how often the team pushes deployments. See the impact of process and tooling changes to ensure continuous improvement."},
  {name:"Lead Time for Changes",desc:"Understand the duration of your full value delivery cycle, from the moment a change is selected for development to its deployment."},
  {name:"Mean Time to Resolution",desc:"Measure the time from the start of an incident to its resolution, and minimize system downtime."},
  {name:"Change Failure Rate",desc:"Monitor the frequency of incidents or deployment failures to guarantee uninterrupted delivery of value to your customers."},
];

const FRAMEWORKS=[
  {name:"SPACE Framework",desc:"Satisfaction, Performance, Activity, Communication, Efficiency"},
  {name:"DevEx Index",desc:"Single score tracking developer experience over time"},
  {name:"AI Impact Framework",desc:"Data-driven model for AI adoption, productivity, and business outcomes"},
  {name:"SEI Maturity Model",desc:"Software Engineering Intelligence maturity assessment"},
];

const INTEGRATIONS={
  "AI Coding":["GitHub Copilot","Cursor","Claude Code","Windsurf","Amazon Q Developer","Gemini Code Assist","Augment","Baz","Graphite","Greptile"],
  "Issue Tracking":["Jira","Linear","Azure Boards","Productboard","Aha!","ProductPlan"],
  "Source & CI/CD":["GitHub (Cloud & Enterprise)","GitLab","Bitbucket Cloud","Bitbucket Server","Azure DevOps","Azure Repos","Jenkins","CircleCI","Buildkite"],
  "Monitoring & Quality":["PagerDuty","Opsgenie","SonarQube","CodeRabbit","Sourcegraph"],
  "Collaboration":["Slack","Google Sheets","Google Calendar"],
};

const PLATFORM_FEATURES=[
  {category:"AI Impact",features:["Drive Adoption","Enable Teams","Impact Insights","Vendor Comparison","Investment Management","Workflow Optimization","Report Builder"]},
  {category:"Operational Effectiveness",features:["Metrics (DORA, flow, custom)","Life Cycle Explorer","Workflow Analysis","People Management","Team Benchmarks"]},
  {category:"Planning & Delivery",features:["Capacity Planner","Scenario Planner"]},
  {category:"Business Alignment",features:["Resource Allocations (Patented Work Model)"]},
  {category:"DevEx",features:["Research-backed surveys","DevEx Index","DORA/SPACE correlation","Industry benchmarking","AI-driven recommendations","Automated tracking"]},
  {category:"DevFinOps",features:["Software Capitalization"]},
];

const C={bg:"#f8f9fb",srf:"#ffffff",alt:"#f1f3f7",bdr:"#dfe3ea",bdrL:"#e8ecf1",txt:"#1a1f36",txtS:"#525f7f",txtM:"#8898aa",acc:"#0055d4",accL:"#e8f0fe",ok:"#0d8050",okL:"#e6f4ed",wrn:"#bf7600",wrnL:"#fef3e0",err:"#c23030",errL:"#fde8e8",pur:"#6e40c9",purL:"#f0ebfa"};

// ─── Components ──────────────────────────────────────────────────────────────
function Badge({children,color="acc"}){
  const bgM={acc:C.accL,ok:C.okL,wrn:C.wrnL,err:C.errL,pur:C.purL};
  const fgM={acc:C.acc,ok:C.ok,wrn:C.wrn,err:C.err,pur:C.pur};
  return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,letterSpacing:.3,background:bgM[color],color:fgM[color],textTransform:"uppercase"}}>{children}</span>;
}

function Card({children,style}){
  return <div style={{background:C.srf,border:`1px solid ${C.bdr}`,borderRadius:8,padding:20,...style}}>{children}</div>;
}

function STitle({children,sub}){
  return <div style={{marginBottom:16}}><h3 style={{margin:0,fontSize:17,fontWeight:700,color:C.txt}}>{children}</h3>{sub&&<p style={{margin:"4px 0 0",fontSize:13,color:C.txtS}}>{sub}</p>}</div>;
}

function Guide({title,children}){
  return <div style={{background:C.accL,border:`1px solid ${C.acc}33`,borderRadius:8,padding:16,marginBottom:16}}>
    <div style={{fontSize:13,fontWeight:700,color:C.acc,marginBottom:6}}>{title}</div>
    <div style={{fontSize:13,lineHeight:1.6,color:C.txt}}>{children}</div>
  </div>;
}

function Bar({label,value,max,color}){
  return <div style={{marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3,color:C.txtS}}>
      <span>{label}</span><span style={{fontWeight:600,color:C.txt}}>{value}</span>
    </div>
    <div style={{height:8,background:C.alt,borderRadius:4,overflow:"hidden"}}>
      <div style={{height:"100%",width:`${Math.min(100,(value/max)*100)}%`,background:color||C.acc,borderRadius:4,transition:"width .5s ease"}}/>
    </div>
  </div>;
}

function EpRow({ep,onTry}){
  return <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.bdrL}`}}>
    <code style={{flex:1,wordBreak:"break-all"}}>{ep.path}</code>
    <span style={{flex:1,fontSize:12,color:C.txtS}}>{ep.desc}</span>
    {onTry&&<button onClick={()=>onTry(ep)} style={{padding:"4px 10px",border:`1px solid ${C.acc}`,background:"transparent",color:C.acc,borderRadius:4,fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>Try it</button>}
  </div>;
}

// ─── API Panel ───────────────────────────────────────────────────────────────
function ApiPanel({token,setToken}){
  const[status,setStatus]=useState(null);
  const test=async()=>{
    if(!token){setStatus("err");return}
    setStatus("load");
    try{const r=await fetch(`${API_BASE}/endpoints/export/v0/teams/list_teams?hierarchy_level=1`,{headers:{"Authorization":`Token ${token}`}});setStatus(r.ok?"ok":"err")}
    catch(e){setStatus("err")}
  };
  return <Card style={{marginBottom:20}}>
    <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:250}}>
        <label style={{fontSize:11,fontWeight:600,color:C.txtS,textTransform:"uppercase",letterSpacing:.5,display:"block",marginBottom:4}}>Jellyfish API Token</label>
        <input type="password" value={token} onChange={e=>{setToken(e.target.value);setStatus(null)}} placeholder="Paste from app.jellyfish.co/settings/data-connections/api-export" style={{width:"100%",padding:"8px 12px",border:`1px solid ${C.bdr}`,borderRadius:6,fontSize:13,boxSizing:"border-box",outline:"none"}}/>
      </div>
      <button onClick={test} disabled={status==="load"} style={{padding:"8px 18px",background:C.acc,color:"#fff",border:"none",borderRadius:6,fontWeight:600,fontSize:13,cursor:"pointer",marginTop:18,opacity:status==="load"?.6:1}}>
        {status==="load"?"Testing...":"Connect"}
      </button>
      {status==="ok"&&<Badge color="ok">Connected</Badge>}
      {status==="err"&&<Badge color="err">Failed</Badge>}
    </div>
    <p style={{margin:"10px 0 0",fontSize:12,color:C.txtM}}>
      Token setup: Admin User Role required. Go to <a href="https://app.jellyfish.co/settings/data-connections/api-export" target="_blank">API Export settings</a> &rarr; Generate New Token.
    </p>
  </Card>;
}

// ─── API Explorer ────────────────────────────────────────────────────────────
function ApiExplorer({token,endpoint,params:init}){
  const[params,setParams]=useState(init||{});
  const[result,setResult]=useState(null);
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState(null);
  const call=async()=>{
    if(!token){setError("Enter your API token above.");return}
    setLoading(true);setError(null);setResult(null);
    try{
      const u=new URL(endpoint.path,API_BASE);
      Object.entries(params).forEach(([k,v])=>{if(v)u.searchParams.set(k,v)});
      const r=await fetch(u.toString(),{headers:{"Authorization":`Token ${token}`}});
      if(r.ok)setResult(await r.json());else setError(`HTTP ${r.status}: ${await r.text()}`);
    }catch(e){setError(`Request failed: ${e.message}`)}
    setLoading(false);
  };
  return <Card style={{marginTop:12,background:C.alt}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
      <Badge color="acc">GET</Badge><code>{endpoint.path}</code>
    </div>
    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}}>
      {Object.entries(params).map(([k,v])=><div key={k}>
        <label style={{fontSize:11,color:C.txtM,display:"block",marginBottom:2}}>{k}</label>
        <input value={v} onChange={e=>setParams(p=>({...p,[k]:e.target.value}))} style={{padding:"6px 10px",border:`1px solid ${C.bdr}`,borderRadius:4,fontSize:12,width:160}}/>
      </div>)}
    </div>
    <button onClick={call} disabled={loading} style={{padding:"6px 14px",background:C.acc,color:"#fff",border:"none",borderRadius:4,fontSize:12,fontWeight:600,cursor:"pointer",opacity:loading?.6:1}}>
      {loading?"Calling...":"Execute"}
    </button>
    {error&&<div style={{marginTop:10,padding:10,background:C.errL,borderRadius:4,fontSize:12,color:C.err}}>{error}</div>}
    {result&&<pre style={{marginTop:10,padding:12,background:"#1e2535",color:"#c8d6e5",borderRadius:6,fontSize:11,maxHeight:300,overflow:"auto",whiteSpace:"pre-wrap",wordBreak:"break-word"}}><code>{JSON.stringify(result,null,2)}</code></pre>}
  </Card>;
}

// ─── Tab: Sprint Health ──────────────────────────────────────────────────────

  const[exp,setExp]=useState(null);
  const sprints=[
    {name:"Sprint 24",committed:34,completed:29,carry:5,vel:58,pts:58},
    {name:"Sprint 23",committed:31,completed:28,carry:3,vel:54,pts:54},
    {name:"Sprint 22",committed:36,completed:32,carry:4,vel:61,pts:61},

    <Guide title="Scrum Master Guide: Sprint Metrics & Health">

      <p style={{margin:0}}><strong>Key endpoints:</strong> <code>team_sprint_summary</code> returns issue counts and story point data per sprint. <code>team_metrics</code> provides broader team-level metrics. <code>company_metrics</code> gives org-wide context.</p>
    </Guide>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:20}}>
      {[{l:"Avg Velocity",v:"56.3 pts",s:"Last 4 sprints",c:C.acc},{l:"Completion Rate",v:"88%",s:"Completed vs committed",c:C.ok},{l:"Carry-Over",v:"3.0 avg",s:"Rolling to next sprint",c:C.wrn},{l:"Cadence",v:"2 weeks",s:"Iteration length",c:C.pur}].map((m,i)=>
        <Card key={i} style={{padding:16}}>
          <div style={{fontSize:11,fontWeight:600,color:C.txtM,textTransform:"uppercase",letterSpacing:.5}}>{m.l}</div>
          <div style={{fontSize:26,fontWeight:700,color:m.c,margin:"6px 0 2px"}}>{m.v}</div>
          <div style={{fontSize:11,color:C.txtS}}>{m.s}</div>
        </Card>

      <tbody>{sprints.map((s,i)=><tr key={i}><td>{s.name}</td><td>{s.committed}</td><td style={{color:C.ok,fontWeight:600}}>{s.completed}</td><td style={{color:s.carry>3?C.wrn:C.txtS}}>{s.carry}</td><td>{s.pts}</td><td style={{fontWeight:600}}>{s.vel}</td></tr>)}</tbody></table>
    </Card>
    <STitle sub="Live API calls">Try the API</STitle>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
      {ENDPOINTS.metrics.map(ep=><button key={ep.name} onClick={()=>setExp(ep)} style={{padding:"6px 12px",fontSize:12,border:`1px solid ${exp?.name===ep.name?C.acc:C.bdr}`,background:exp?.name===ep.name?C.accL:"transparent",color:exp?.name===ep.name?C.acc:C.txtS,borderRadius:4,cursor:"pointer",fontWeight:500}}>{ep.name}</button>)}
    </div>
    {exp&&<ApiExplorer token={token} endpoint={exp} params={exp.name==="team_sprint_summary"?{team:"",start:"",end:""}:exp.name==="person_metrics"?{person:"",start:"",end:""}:{start:"",end:""}}/>}
    <div style={{marginTop:20}}>
      <Guide title="How to Use This in Sprint Ceremonies">
        <p style={{margin:"0 0 6px"}}><strong>Sprint Planning:</strong> Use <code>team_sprint_summary</code> history to calibrate story point commitment. Last 3-4 sprints velocity is your best predictor.</p>
        <p style={{margin:"0 0 6px"}}><strong>Daily Standup:</strong> Reference <code>team_metrics</code> to surface cycle time anomalies or blocked items.</p>
        <p style={{margin:"0 0 6px"}}><strong>Sprint Review:</strong> Present completion rates and throughput from <code>team_sprint_summary</code> to stakeholders.</p>
        <p style={{margin:0}}><strong>Retrospective:</strong> Compare <code>unlinked_pull_requests</code> to reveal invisible work. Use DORA metrics from <code>company_metrics</code> for deployment trends.</p>
      </Guide>

// ─── Tab: Delivery ───────────────────────────────────────────────────────────

  const[view,setView]=useState("investment");
  return <div>

  return <div style={{minHeight:"100vh"}}>
    <div style={{background:C.srf,borderBottom:`1px solid ${C.bdr}`,padding:"16px 24px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:1100,margin:"0 auto"}}>
        <div>
          <h1 style={{margin:0,fontSize:20,fontWeight:700,letterSpacing:-.3}}>Jellyfish Scrum Master Assistant</h1>
          <p style={{margin:"2px 0 0",fontSize:13,color:C.txtS}}>Educational guide + live API integration — all data from verified inventory</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <Badge color="acc">25 Endpoints</Badge>
          <Badge color="pur">6 Domains</Badge>
          <Badge color="ok">Verified</Badge>
        </div>
      </div>
    </div>
    <div style={{background:C.srf,borderBottom:`1px solid ${C.bdr}`,padding:"0 24px",overflowX:"auto"}}>
      <div style={{display:"flex",maxWidth:1100,margin:"0 auto"}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",alignItems:"center",gap:6,padding:"12px 18px",border:"none",borderBottom:`2px solid ${tab===t.id?C.acc:"transparent"}`,background:"transparent",color:tab===t.id?C.acc:C.txtS,fontWeight:tab===t.id?700:500,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>
          <span style={{width:22,height:22,borderRadius:4,background:tab===t.id?C.accL:C.alt,color:tab===t.id?C.acc:C.txtM,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>{t.icon}</span>
          {t.label}
        </button>)}
      </div>
    </div>
    <div style={{maxWidth:1100,margin:"0 auto",padding:"20px 24px"}}>
      <ApiPanel token={token} setToken={setToken}/>
      {tab==="sprint"&&<SprintTab token={token}/>}
      {tab==="delivery"&&<DeliveryTab token={token}/>}
      {tab==="allocation"&&<AllocTab token={token}/>}
      {tab==="devex"&&<DevExTab token={token}/>}
      {tab==="people"&&<PeopleTab token={token}/>}
      {tab==="reference"&&<RefTab/>}
    </div>
    <div style={{borderTop:`1px solid ${C.bdr}`,padding:"16px 24px",textAlign:"center",marginTop:40}}>
      <p style={{fontSize:11,color:C.txtM}}>All data from jellyfish.co, Jellyfish-AI GitHub repos, and published docs. No fabrications. Validated March 30, 2026.</p>
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
